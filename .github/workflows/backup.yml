name: Backup PG to R2
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install PG client + AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client awscli
      - name: Dump and upload
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          F="shop-$(date -u +%Y%m%d-%H%M).sql.gz"
          pg_dump "$DATABASE_URI" | gzip > "$F"
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          aws s3 cp "$F" "s3://$R2_BACKUP_BUCKET/$F" \
            --endpoint-url "https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
