name: Trigger Render deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d83hofjtqb8s73dor2ug
        run: |
          DEPLOY=$(curl -sS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          DEP_ID=$(echo "$DEPLOY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))")
          echo "Render deploy queued: $DEP_ID"
          if [ -z "$DEP_ID" ]; then
            echo "$DEPLOY"
            exit 1
          fi
          echo "Track: https://dashboard.render.com/web/$RENDER_SERVICE_ID/deploys/$DEP_ID"
